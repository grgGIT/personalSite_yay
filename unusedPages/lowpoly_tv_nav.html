<script>
const chs=[
  {n:'01',lb:'HOME',sb:'START HERE',col:'#5599ff',bg:'#000816',
   sp:"Mmm... home page...\nD'oh! I mean, welcome!",
   url:'../index.html',
   ic:`<polygon points="16,4 28,16 4,16" fill="COLR"/><rect x="8" y="16" width="16" height="12" rx="1" fill="COLR"/><rect x="12" y="21" width="8" height="7" fill="COLR" opacity="0.35"/>`},
  {n:'02',lb:'SERVICES',sb:'WHAT I DO',col:'#ff8844',bg:'#120400',
   sp:"Services... like when\nsomeone does stuff so\nyou don't have to. Excellent.",
   url:'./services.html',
   ic:`<circle cx="16" cy="16" r="8" fill="none" stroke="COLR" stroke-width="2.5"/><line x1="16" y1="8" x2="16" y2="24" stroke="COLR" stroke-width="2"/><line x1="8" y1="16" x2="24" y2="16" stroke="COLR" stroke-width="2"/>`},
  {n:'03',lb:'DEV STUFF',sb:'CODE AND THINGS',col:'#44ff88',bg:'#001408',
   sp:"The blinking cursor lines!\nThey go so fast...\nI'm so smart.",
   url:'./dev.html',
   ic:`<polygon points="4,16 12,9 12,23" fill="COLR"/><polygon points="28,16 20,9 20,23" fill="COLR"/><line x1="15" y1="8" x2="17" y2="24" stroke="COLR" stroke-width="2"/>`},
  {n:'04',lb:'ARTS',sb:'CREATIVE WORK',col:'#ff44bb',bg:'#12000a',
   sp:"Art! I know about art.\nIt's got colors and...\nfeelings. Mostly feelings.",
   url:'./arts.html',
   ic:`<circle cx="16" cy="16" r="9" fill="none" stroke="COLR" stroke-width="2"/><circle cx="12" cy="13" r="2.5" fill="COLR"/><circle cx="20" cy="13" r="2.5" fill="COLR"/><circle cx="16" cy="21" r="2.5" fill="COLR"/>`}
];

let cur=0, bt;

function mkDots(){
  const d=document.getElementById('chDots');
  d.innerHTML='';
  chs.forEach((_,i)=>{
    const el=document.createElement('div');
    el.style.cssText='width:6px;height:6px;border-radius:50%;cursor:pointer;transition:background .2s;background:'+(i===cur?'#ffd700':'#2a2a48')+';border:1px solid '+(i===cur?'#ffd700':'#44445a');
    el.onclick=()=>goTo(i);
    d.appendChild(el);
  });
}

function showBubble(txt){
  clearTimeout(bt);
  document.getElementById('bTxt').textContent=txt;
  document.getElementById('bbl').className='bv';
  bt=setTimeout(()=>document.getElementById('bbl').className='bh',4800);
}

function applyC(i){
  const c=chs[i];
  document.getElementById('tvC').style.background=c.bg;
  document.getElementById('chN').textContent='CH '+c.n;
  document.getElementById('chLb').textContent=c.lb;
  document.getElementById('chLb').style.color=c.col;
  document.getElementById('chSb').textContent=c.sb;
  document.getElementById('chEn').style.borderColor=c.col+'44';
  document.getElementById('chEn').style.color=c.col+'88';
  document.getElementById('chIco').innerHTML=c.ic.replace(/COLR/g,c.col);
  mkDots();
}

function goTo(i){
  if(i===cur)return;
  const f=document.getElementById('tvF');
  f.style.transition='none';
  f.style.opacity='1';
  cur=i; applyC(i);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    f.style.transition='opacity .14s';
    f.style.opacity='0';
  }));
  setTimeout(()=>showBubble(chs[i].sp),130);
}

function prevCh(){if(cur>0)goTo(cur-1);}
function nextCh(){if(cur<chs.length-1)goTo(cur+1);}

function enterCh(){
  const f=document.getElementById('tvF');
  f.style.transition='none';
  f.style.opacity='1';
  setTimeout(()=>openLink(chs[cur].url),80);
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')prevCh();
  if(e.key==='ArrowRight')nextCh();
  if(e.key==='Enter'||e.key===' ')enterCh();
});

applyC(0);
setTimeout(()=>showBubble(chs[0].sp),900);
</script>
