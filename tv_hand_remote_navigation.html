
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --c1:#1a1a2e;--c2:#16213e;--c3:#0f3460;--c4:#e94560;
  --skin1:#f0c080;--skin2:#d4955a;--skin3:#b87040;
  --remote:#2a2a3a;--btn:#3a3a4a;--led:#00ff88;
}
body{font-family:var(--font-sans,sans-serif)}
.nav-wrap{
  min-height:500px;
  background:linear-gradient(135deg,var(--c1) 0%,var(--c2) 50%,var(--c3) 100%);
  border-radius:var(--border-radius-lg,12px);
  padding:20px;
  display:flex;flex-direction:column;align-items:center;gap:16px;
  position:relative;overflow:hidden;
}
.nav-wrap::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 20%,rgba(233,69,96,0.15) 0%,transparent 60%);
  pointer-events:none;
}
.tv-screen{
  width:100%;max-width:560px;
  background:#0a0a14;
  border:3px solid #333;
  border-radius:12px;
  padding:8px;
  box-shadow:0 0 0 6px #1a1a1a,0 0 0 8px #333;
  position:relative;
}
.tv-top{
  background:#111;border-radius:8px;
  padding:6px;
  display:grid;grid-template-columns:1fr 1fr;
  gap:6px;min-height:160px;
}
.tv-channel{
  border-radius:6px;
  cursor:pointer;
  transition:all 0.25s;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:6px;
  padding:10px 6px;
  position:relative;
  border:2px solid transparent;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.tv-channel.active{
  border-color:var(--c4);
  box-shadow:0 0 12px rgba(233,69,96,0.4);
}
.tv-channel:hover{filter:brightness(1.15)}
.tv-channel:active{transform:scale(0.97)}
.ch-icon{font-size:28px;line-height:1}
.ch-label{font-size:11px;font-weight:500;color:#eee;text-align:center;letter-spacing:0.3px}
.ch-sub{font-size:10px;color:#888;text-align:center}
.tv-scanline{
  position:absolute;inset:0;border-radius:6px;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.08) 3px,rgba(0,0,0,0.08) 4px);
  pointer-events:none;
}
.tv-bottom{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 10px 2px;
}
.tv-brand{font-size:10px;color:#444;letter-spacing:2px;font-weight:500}
.tv-led{width:6px;height:6px;border-radius:50%;background:var(--led);box-shadow:0 0 4px var(--led)}
.controls-row{
  display:flex;align-items:flex-end;justify-content:center;
  gap:24px;width:100%;max-width:560px;
}
.hand-scene{
  width:120px;height:160px;
  position:relative;
  perspective:400px;
  flex-shrink:0;
}
.hand-3d{
  width:100%;height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.6s cubic-bezier(0.34,1.56,0.64,1);
}
.poly-palm{
  position:absolute;
  bottom:10px;left:50%;transform:translateX(-50%);
  width:64px;height:54px;
}
.poly-palm svg,.poly-finger svg{display:block}
.poly-finger{
  position:absolute;
  transform-origin:bottom center;
  transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
.f-thumb{left:4px;bottom:52px;width:22px;height:44px}
.f-index{left:22px;bottom:56px;width:18px;height:60px}
.f-middle{left:38px;bottom:58px;width:18px;height:64px}
.f-ring{left:54px;bottom:56px;width:16px;height:58px}
.f-pinky{left:68px;bottom:52px;width:14px;height:48px}
.point-label{
  position:absolute;top:-6px;left:50%;transform:translateX(-50%);
  background:var(--c4);color:#fff;font-size:9px;padding:2px 6px;
  border-radius:10px;white-space:nowrap;opacity:0;
  transition:opacity 0.3s;pointer-events:none;
}
.hand-3d.pointing .point-label{opacity:1}
.remote{
  background:var(--remote);
  border-radius:20px 20px 28px 28px;
  width:90px;
  padding:12px 10px 16px;
  border:1.5px solid #3a3a4a;
  box-shadow:4px 4px 0 #111,-2px -2px 0 #3a3a4a;
  flex-shrink:0;
}
.remote-screen{
  background:#001a0a;
  border-radius:6px;
  height:28px;display:flex;align-items:center;justify-content:center;
  margin-bottom:10px;
  border:1px solid #003310;
}
.remote-display{font-size:10px;color:var(--led);font-family:monospace;letter-spacing:1px}
.remote-btns{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px}
.r-btn{
  background:var(--btn);
  border:none;border-radius:6px;
  color:#ccc;font-size:9px;padding:5px 4px;
  cursor:pointer;
  transition:all 0.15s;
  border-bottom:2px solid #111;
  font-family:var(--font-sans,sans-serif);
  -webkit-tap-highlight-color:transparent;
}
.r-btn:active,.r-btn.lit{background:var(--c4);color:#fff;border-bottom-color:rgba(0,0,0,0.3);transform:translateY(1px)}
.r-dpad{
  width:60px;height:60px;
  position:relative;margin:0 auto;
}
.d-btn{
  position:absolute;
  background:var(--btn);border:none;border-radius:4px;
  color:#aaa;font-size:11px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.d-btn:active{background:var(--c4);color:#fff;transform:scale(0.93)}
.d-up{top:0;left:50%;transform:translateX(-50%);width:20px;height:18px}
.d-dn{bottom:0;left:50%;transform:translateX(-50%);width:20px;height:18px}
.d-lt{left:0;top:50%;transform:translateY(-50%);width:18px;height:20px}
.d-rt{right:0;top:50%;transform:translateY(-50%);width:18px;height:20px}
.d-ctr{top:50%;left:50%;transform:translate(-50%,-50%);width:18px;height:18px;border-radius:50%;background:#444}
.status-bar{
  width:100%;max-width:560px;
  background:rgba(255,255,255,0.05);
  border-radius:8px;
  padding:8px 14px;
  display:flex;align-items:center;justify-content:space-between;
}
.status-txt{font-size:12px;color:#aaa}
.status-page{font-size:13px;color:#fff;font-weight:500}
.mobile-hint{font-size:10px;color:#666;text-align:center}
@media(max-width:400px){
  .controls-row{gap:12px}
  .hand-scene{width:90px;height:130px}
  .remote{width:76px}
  .tv-top{min-height:140px}
  .ch-icon{font-size:22px}
}
</style>

<div class="nav-wrap" role="navigation" aria-label="TV remote page navigation">
  <h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Interactive TV remote navigation — select a page from the split screen</h2>

  <div class="tv-screen" role="region" aria-label="Channel selector">
    <div class="tv-top" id="channelGrid">
      <!-- channels injected by JS -->
    </div>
    <div class="tv-bottom">
      <span class="tv-brand">NAVTV</span>
      <div class="tv-led" aria-hidden="true"></div>
    </div>
  </div>

  <div class="controls-row">
    <div class="hand-scene" aria-hidden="true">
      <div class="hand-3d" id="hand3d">
        <span class="point-label" id="pointLabel">→</span>
        <!-- fingers -->
        <div class="poly-finger f-thumb" id="fThumb">
          <svg viewBox="0 0 22 44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="11,2 20,38 11,44 2,38" fill="#d4955a"/>
            <polygon points="11,2 20,22 11,28" fill="#f0c080"/>
            <polygon points="11,2 2,22 11,28" fill="#c07040"/>
            <polygon points="2,38 11,28 20,38" fill="#b87040"/>
          </svg>
        </div>
        <div class="poly-finger f-index" id="fIndex">
          <svg viewBox="0 0 18 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="9,2 17,50 9,60 1,50" fill="#d4955a"/>
            <polygon points="9,2 17,28 9,36" fill="#f0c080"/>
            <polygon points="9,2 1,28 9,36" fill="#c07040"/>
            <polygon points="1,50 9,36 17,50" fill="#b87040"/>
            <polygon points="9,2 14,10 9,14 4,10" fill="#e8a870" opacity="0.8"/>
          </svg>
        </div>
        <div class="poly-finger f-middle" id="fMiddle">
          <svg viewBox="0 0 18 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="9,2 17,54 9,64 1,54" fill="#d4955a"/>
            <polygon points="9,2 17,30 9,38" fill="#f0c080"/>
            <polygon points="9,2 1,30 9,38" fill="#c07040"/>
            <polygon points="1,54 9,38 17,54" fill="#b87040"/>
          </svg>
        </div>
        <div class="poly-finger f-ring" id="fRing">
          <svg viewBox="0 0 16 58" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="8,2 15,48 8,58 1,48" fill="#d4955a"/>
            <polygon points="8,2 15,26 8,34" fill="#f0c080"/>
            <polygon points="8,2 1,26 8,34" fill="#c07040"/>
            <polygon points="1,48 8,34 15,48" fill="#b87040"/>
          </svg>
        </div>
        <div class="poly-finger f-pinky" id="fPinky">
          <svg viewBox="0 0 14 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="7,2 13,40 7,48 1,40" fill="#d4955a"/>
            <polygon points="7,2 13,22 7,28" fill="#f0c080"/>
            <polygon points="7,2 1,22 7,28" fill="#c07040"/>
            <polygon points="1,40 7,28 13,40" fill="#b87040"/>
          </svg>
        </div>
        <!-- palm -->
        <div class="poly-palm">
          <svg viewBox="0 0 64 54" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="32,0 62,14 58,54 6,54 2,14" fill="#d4955a"/>
            <polygon points="32,0 62,14 38,28" fill="#f0c080"/>
            <polygon points="32,0 2,14 26,28" fill="#c07040"/>
            <polygon points="2,14 26,28 38,28 62,14" fill="#e0a068"/>
            <polygon points="6,54 26,28 38,28 58,54" fill="#b87040"/>
          </svg>
        </div>
      </div>
    </div>

    <div class="remote" role="group" aria-label="Remote control">
      <div class="remote-screen">
        <div class="remote-display" id="remoteDisplay">CH--</div>
      </div>
      <div class="remote-btns">
        <button class="r-btn" onclick="selectByIndex(0)" aria-label="Channel 1">CH1</button>
        <button class="r-btn" onclick="selectByIndex(1)" aria-label="Channel 2">CH2</button>
        <button class="r-btn" onclick="selectByIndex(2)" aria-label="Channel 3">CH3</button>
        <button class="r-btn" onclick="selectByIndex(3)" aria-label="Channel 4">CH4</button>
      </div>
      <div class="r-dpad" role="group" aria-label="D-pad">
        <button class="d-btn d-up" onclick="navUp()" aria-label="Up">▲</button>
        <button class="d-btn d-dn" onclick="navDown()" aria-label="Down">▼</button>
        <button class="d-btn d-lt" onclick="navLeft()" aria-label="Left">◀</button>
        <button class="d-btn d-rt" onclick="navRight()" aria-label="Right">▶</button>
        <button class="d-btn d-ctr" onclick="confirm()" aria-label="Select">●</button>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <span class="status-txt" id="statusTxt">Select a channel to navigate</span>
    <span class="status-page" id="statusPage">—</span>
  </div>
  <div class="mobile-hint">Tap a screen or use the remote · Swipe-friendly</div>
</div>

<script>
const pages=[
  {id:0,label:'Home',sub:'Start here',icon:'🏠',color:'#1a3a6e',glow:'#3a6aff'},
  {id:1,label:'About',sub:'Who we are',icon:'👤',color:'#2a1a4e',glow:'#9a6aff'},
  {id:2,label:'Work',sub:'Portfolio',icon:'💼',color:'#1a3a2e',glow:'#3aff9a'},
  {id:3,label:'Contact',sub:'Get in touch',icon:'✉️',color:'#3a1a1e',glow:'#ff6a7a'},
];

let selected=-1;
let touchStartX=0,touchStartY=0;

function buildGrid(){
  const g=document.getElementById('channelGrid');
  g.innerHTML='';
  pages.forEach((p,i)=>{
    const ch=document.createElement('div');
    ch.className='tv-channel'+(selected===i?' active':'');
    ch.style.background=p.color;
    ch.setAttribute('role','button');
    ch.setAttribute('tabindex','0');
    ch.setAttribute('aria-pressed',selected===i?'true':'false');
    ch.setAttribute('aria-label',`Channel ${i+1}: ${p.label}`);
    ch.innerHTML=`<div class="tv-scanline"></div><div class="ch-icon">${p.icon}</div><div class="ch-label">${p.label}</div><div class="ch-sub">${p.sub}</div>`;
    ch.onclick=()=>selectByIndex(i);
    ch.onkeydown=(e)=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();selectByIndex(i);}};
    g.appendChild(ch);
  });
}

function selectByIndex(i){
  if(i<0||i>=pages.length)return;
  selected=i;
  buildGrid();
  animateHand(i);
  updateRemote(i);
  updateStatus(i);
  flashBtn(i);
}

function animateHand(i){
  const hand=document.getElementById('hand3d');
  const label=document.getElementById('pointLabel');
  const rotations=[['-15deg','10deg'],['0deg','0deg'],['0deg','-10deg'],['15deg','-20deg']];
  const p=pages[i];
  const [ry,rx]=rotations[i]||['0','0'];
  hand.style.transform=`rotateY(${ry}) rotateX(${rx})`;
  hand.classList.add('pointing');
  label.textContent='→ '+p.label;
  curlyFingers(i);
  setTimeout(()=>{hand.classList.remove('pointing');},2200);
}

function curlyFingers(i){
  const fingers=['fThumb','fIndex','fMiddle','fRing','fPinky'];
  const curls=[[0,0,0,0,0],[0,0,60,60,70],[0,0,0,60,70],[0,60,60,0,70],[0,60,60,60,0]];
  const set=curls[i]||[0,0,0,0,0];
  fingers.forEach((id,fi)=>{
    const el=document.getElementById(id);
    if(el)el.style.transform=`rotateX(${set[fi]}deg)`;
  });
}

function updateRemote(i){
  document.getElementById('remoteDisplay').textContent=`CH 0${i+1}`;
  const btns=document.querySelectorAll('.r-btn');
  btns.forEach((b,bi)=>b.classList.toggle('lit',bi===i));
}

function updateStatus(i){
  const p=pages[i];
  document.getElementById('statusTxt').textContent=`Navigating to: ${p.label} — ${p.sub}`;
  document.getElementById('statusPage').textContent=p.label;
}

function flashBtn(i){
  const btns=document.querySelectorAll('.r-btn');
  if(btns[i]){
    btns[i].classList.add('lit');
    setTimeout(()=>{if(selected!==i)btns[i].classList.remove('lit');},600);
  }
}

function navUp(){if(selected>1)selectByIndex(selected-2);}
function navDown(){if(selected<2)selectByIndex(selected+2);}
function navLeft(){if(selected>0)selectByIndex(selected-1);}
function navRight(){if(selected<pages.length-1)selectByIndex(selected+1);}
function confirm(){
  if(selected>=0){
    sendPrompt(`The user selected "${pages[selected].label}" from the TV nav. Describe what that page section might contain.`);
  }
}

document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){
    if(dx>0)navLeft(); else navRight();
  }else if(Math.abs(dy)>40){
    if(dy>0)navUp(); else navDown();
  }
},{passive:true});

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')navLeft();
  if(e.key==='ArrowRight')navRight();
  if(e.key==='ArrowUp')navUp();
  if(e.key==='ArrowDown')navDown();
  if(e.key==='Enter')confirm();
});

buildGrid();
setTimeout(()=>selectByIndex(0),400);
</script>
