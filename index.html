<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WELCOME!!</title>
    <link rel="stylesheet" href="./css/general.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Aldrich&family=Bitcount+Prop+Double+Ink:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Overpass:ital,wght@0,100..900;1,100..900&family=Ranchers&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100%;
        }

        body {
            position: relative;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #3a7bd5, #00d2ff);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
        }

        #ftank {
            position: fixed;
            inset: 0;
            width: 100vw;
            min-height: 100vh;
            z-index: -2;
            overflow: hidden;
            background: #061a2e;
            border-radius: 0;
        }

        #ftc {
            width: 100%;
            height: 100%;
            display: block;
        }

        #CRT-Graphic {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            padding: 2rem 1.2rem;
            width: 100%;
            max-width: 760px;
            text-align: center;
        }

        #trippy-text {
            position: relative;
            text-align: center;
            color: white;
            font-size: clamp(2.8rem, 8vw, 5.5rem);
            transition: 0.5s;
            font-family: "Aldrich", sans-serif;
            z-index: 1;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            padding: 0.5rem 0.75rem;
            line-height: 1.05;
        }

        #trippy-text:hover {
            color: #ff69b4;
            text-shadow: 4px 4px 8px rgba(255, 105, 180, 0.8);
            transform: scale(1.05);
        }

        .glass-btn {
            position: relative;
            padding: 14px 28px;
            font-size: 1rem;
            color: white;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            box-shadow:
                0 8px 24px rgba(0,0,0,0.25),
                inset 0 1px 1px rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.25s ease;
            width: min(100%, 280px);
        }

        .glass-btn:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-2px);
            box-shadow:
                0 12px 28px rgba(0,0,0,0.35),
                inset 0 1px 2px rgba(255,255,255,0.4);
        }

        .glass-btn:active {
            transform: translateY(0);
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.3);
        }

        .glass-btn::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 14px;
            background: linear-gradient(
                180deg,
                rgba(255,255,255,0.6),
                rgba(255,255,255,0.1) 40%,
                rgba(255,255,255,0)
            );
            opacity: 0.4;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            body {
                padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            }

            #CRT-Graphic {
                padding: 1.5rem 1rem;
            }

            .glass-btn {
                font-size: 0.95rem;
                padding: 12px 22px;
                width: 100%;
            }
        }
    </style>
</head>
    <body>
        <div id="ftank">
            <canvas id="ftc"></canvas>
        </div>
<script>
(function(){
const wrap = document.getElementById('ftank');
const cv = document.getElementById('ftc');
const W = wrap.clientWidth||800, H = wrap.clientHeight||500;
const renderer = new THREE.WebGLRenderer({canvas:cv,antialias:true});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setClearColor(0x061a2e);
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x061a2e,0.022);
const cam = new THREE.PerspectiveCamera(55,W/H,0.1,100);
cam.position.set(0,1.5,15);
cam.lookAt(0,0,0);

scene.add(new THREE.AmbientLight(0x2255aa,1.0));
const sun = new THREE.DirectionalLight(0x99bbdd,1.2);
sun.position.set(5,10,6);
scene.add(sun);
const shimmer = new THREE.PointLight(0x0099ff,0.9,28);
scene.add(shimmer);

// Floor
const fg = new THREE.PlaneGeometry(26,14,24,14);
const fvp = fg.attributes.position;
for(let i=0;i<fvp.count;i++) fvp.setZ(i,(Math.random()-0.5)*0.55);
fg.computeVertexNormals();
const floor = new THREE.Mesh(fg,new THREE.MeshLambertMaterial({color:0x1a2c10,flatShading:true}));
floor.rotation.x=-Math.PI/2; floor.position.y=-4;
scene.add(floor);

// Water surface
const sg=new THREE.PlaneGeometry(26,14,16,10);
const svp=sg.attributes.position;
for(let i=0;i<svp.count;i++) svp.setZ(i,(Math.random()-0.5)*0.18);
sg.computeVertexNormals();
const surf=new THREE.Mesh(sg,new THREE.MeshLambertMaterial({color:0x0044aa,transparent:true,opacity:0.2,flatShading:true}));
surf.rotation.x=-Math.PI/2; surf.position.y=4.6;
scene.add(surf);

// Fish factory — nose points +X
function makeFish(bc,fc){
  const g=new THREE.Group();
  const bm=new THREE.MeshLambertMaterial({color:bc,flatShading:true});
  const fm=new THREE.MeshLambertMaterial({color:fc,flatShading:true});
  const bdGeo=new THREE.ConeGeometry(0.32,1.3,6);
  bdGeo.rotateZ(-Math.PI/2);
  g.add(new THREE.Mesh(bdGeo,bm));
  const tGeo=new THREE.ConeGeometry(0.36,0.56,3);
  tGeo.rotateZ(Math.PI/2);
  const tail=new THREE.Mesh(tGeo,fm);
  tail.position.set(-0.87,0,0);
  tail.scale.set(1,1.9,0.32);
  g.add(tail); g.userData.tail=tail;
  const dfGeo=new THREE.ConeGeometry(0.1,0.46,3);
  const df=new THREE.Mesh(dfGeo,fm);
  df.position.set(0.05,0.43,0); df.rotation.z=0.2;
  g.add(df);
  const pfGeo=new THREE.ConeGeometry(0.08,0.28,3);
  const pf=new THREE.Mesh(pfGeo,fm);
  pf.position.set(0.1,-0.05,0.24);
  pf.rotation.set(0.3,0.5,1.3);
  g.add(pf);
  const ew=new THREE.Mesh(new THREE.SphereGeometry(0.1,5,4),new THREE.MeshLambertMaterial({color:0xffffff}));
  ew.position.set(0.41,0.1,0.2); g.add(ew);
  const ep=new THREE.Mesh(new THREE.SphereGeometry(0.065,4,4),new THREE.MeshBasicMaterial({color:0x111111}));
  ep.position.set(0.43,0.1,0.26); g.add(ep);
  return g;
}

const fishDefs=[
  [0xff6633,0xcc2200],[0xffcc22,0xcc7700],[0x33aaff,0x0055cc],
  [0x44dd88,0x118844],[0xff55bb,0xcc1177],[0xaabbff,0x5566aa],
  [0xaa44ff,0x6600cc],[0xff3344,0xcc0022],[0xff9922,0xbb5500],[0x22ddcc,0x009988],
];
const BX=9,BY=3.5,BZ=5.5;
const fishes=fishDefs.map(([bc,fc])=>{
  const mesh=makeFish(bc,fc);
  const sc=0.45+Math.random()*0.45;
  mesh.scale.setScalar(sc);
  mesh.position.set((Math.random()-0.5)*BX*1.8,(Math.random()-0.5)*BY*1.5,(Math.random()-0.5)*BZ*1.7);
  const angle=Math.random()*Math.PI*2;
  scene.add(mesh);
  return{mesh,angle,speed:0.026+Math.random()*0.03,wobble:Math.random()*Math.PI*2,bob:Math.random()*Math.PI*2,targetY:mesh.position.y};
});

// Bubbles
const bMat=new THREE.MeshBasicMaterial({color:0x88ccff,transparent:true,opacity:0.28});
const bGeo=new THREE.SphereGeometry(0.06,4,3);
const bubbles=Array.from({length:30},()=>{
  const m=new THREE.Mesh(bGeo,bMat);
  m.scale.setScalar(0.4+Math.random()*1.4);
  m.position.set((Math.random()-0.5)*20,-4+Math.random()*9.5,(Math.random()-0.5)*11);
  scene.add(m);
  return{mesh:m,spd:0.01+Math.random()*0.02,ox:Math.random()*20};
});

// Seaweed
const seaweeds=[];
function makeSeaweed(col){
  const g=new THREE.Group();
  const mat=new THREE.MeshLambertMaterial({color:col,flatShading:true});
  let y=0,segs=3+Math.floor(Math.random()*4);
  for(let i=0;i<segs;i++){
    const h=0.38+Math.random()*0.42;
    const geo=new THREE.ConeGeometry(Math.max(0.03,0.1-i*0.015),h,3);
    geo.translate(0,h/2,0);
    const m=new THREE.Mesh(geo,mat);
    m.position.y=y;
    m.rotation.set((Math.random()-0.5)*0.5,Math.random()*Math.PI*2,(Math.random()-0.5)*0.45);
    g.add(m); y+=h*0.62;
  }
  return g;
}
const swCols=[0x1a6b2a,0x2d8a3e,0x4a7a1a,0x0d5520,0x226633];
for(let i=0;i<16;i++){
  const sw=makeSeaweed(swCols[Math.floor(Math.random()*swCols.length)]);
  sw.position.set((Math.random()-0.5)*24,-4,(Math.random()-0.5)*11);
  scene.add(sw); seaweeds.push(sw);
}

// Rocks
for(let i=0;i<14;i++){
  const r=0.18+Math.random()*0.65;
  const geo=new THREE.DodecahedronGeometry(r,0);
  const vp=geo.attributes.position;
  for(let j=0;j<vp.count;j++) vp.setXYZ(j,vp.getX(j)*(0.8+Math.random()*0.4),vp.getY(j)*(0.7+Math.random()*0.4),vp.getZ(j)*(0.8+Math.random()*0.4));
  geo.computeVertexNormals();
  const lum=0.12+Math.random()*0.22;
  const rock=new THREE.Mesh(geo,new THREE.MeshLambertMaterial({color:new THREE.Color(lum,lum*0.9,lum*0.8),flatShading:true}));
  rock.position.set((Math.random()-0.5)*22,-4+r*0.5,(Math.random()-0.5)*11);
  rock.rotation.set(Math.random()*Math.PI,Math.random()*Math.PI,Math.random()*Math.PI);
  scene.add(rock);
}

// Coral clusters
const coralCols=[0xff4477,0xff6699,0xff2255,0xdd3388,0xff5500,0xffaa00];
for(let i=0;i<8;i++){
  const r=0.12+Math.random()*0.22;
  const geo=new THREE.DodecahedronGeometry(r,0);
  geo.computeVertexNormals();
  const coral=new THREE.Mesh(geo,new THREE.MeshLambertMaterial({color:coralCols[Math.floor(Math.random()*coralCols.length)],flatShading:true}));
  coral.position.set((Math.random()-0.5)*20,-4+r,(Math.random()-0.5)*10);
  coral.rotation.set(Math.random()*Math.PI,Math.random()*Math.PI,Math.random()*Math.PI);
  scene.add(coral);
}

// Animate
let t=0;
function animate(){
  requestAnimationFrame(animate);
  t+=0.016;

  fishes.forEach(f=>{
    f.wobble+=0.072;
    f.bob+=0.019;
    f.angle+=(Math.random()-0.5)*0.055;
    const p=f.mesh.position;
    if(p.x>BX){f.angle=Math.PI-f.angle;p.x=BX;}
    else if(p.x<-BX){f.angle=Math.PI-f.angle;p.x=-BX;}
    if(p.z>BZ){f.angle=-f.angle;p.z=BZ;}
    else if(p.z<-BZ){f.angle=-f.angle;p.z=-BZ;}
    if(Math.random()<0.006) f.targetY=(Math.random()-0.5)*BY*1.7;
    p.y+=(f.targetY-p.y)*0.005+Math.sin(f.bob)*0.009;
    p.y=Math.max(-BY+0.5,Math.min(BY,p.y));
    p.x+=Math.cos(f.angle)*f.speed;
    p.z+=Math.sin(f.angle)*f.speed;
    f.mesh.rotation.y=-f.angle+Math.sin(f.wobble)*0.08;
    f.mesh.rotation.z=Math.sin(f.wobble*0.7)*0.1;
    f.mesh.userData.tail.rotation.y=Math.sin(f.wobble*1.5)*0.38;
  });

  bubbles.forEach(b=>{
    b.mesh.position.y+=b.spd;
    b.mesh.position.x+=Math.sin(t*0.85+b.ox)*0.005;
    if(b.mesh.position.y>5){
      b.mesh.position.y=-4;
      b.mesh.position.x=(Math.random()-0.5)*20;
    }
  });

  seaweeds.forEach((sw,i)=>{
    sw.rotation.z=Math.sin(t*0.45+i*0.8)*0.06;
    sw.rotation.x=Math.cos(t*0.35+i*0.6)*0.04;
  });

  shimmer.position.set(Math.sin(t*0.22)*5,4.2,Math.cos(t*0.17)*4);
  cam.position.set(Math.sin(t*0.06)*0.9,1.5+Math.sin(t*0.05)*0.5,15);
  cam.lookAt(0,0,0);
  renderer.render(scene,cam);
}
animate();

window.addEventListener('resize',()=>{
  const nW=wrap.clientWidth,nH=wrap.clientHeight;
  renderer.setSize(nW,nH);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  cam.aspect=nW/nH;
  cam.updateProjectionMatrix();
});
})();
</script>
<div id="CRT-Graphic">

<h1 id="trippy-text">WELCOME TO MY WEBSITE!</h1>
<button class="glass-btn" onclick="window.location.href='./leading.html'">Explore!</button>
        </div>

    </body>
</html>
